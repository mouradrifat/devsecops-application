apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops
  labels:
    app: devsecops

spec:
  replicas: 1

  selector:
    matchLabels:
      app: devsecops

  template:
    metadata:
      labels:
        app: devsecops

    spec:
      containers:
      - name: devsecops-container
        image: devsecops-application:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        securityContext:
          runAsNonRoot: true

---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: devsecops
  name: devsecops-svc
spec:
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: devsecops
  type: NodePort